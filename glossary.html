<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Search the canonical PHI OS Book I glossary.">
  <title data-i18n="knowledge.glossary.metaTitle">Glossary — PHI OS Knowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Newsreader:opsz,wght@6..72,400;6..72,500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/design/foundation.css">
  <link rel="stylesheet" href="/assets/css/design/typography.css">
  <link rel="stylesheet" href="/assets/css/public-experience.css">
  <link rel="stylesheet" href="/assets/css/knowledge-release.css">
</head>
<body class="knowledge-page" data-public-section="knowledge" data-page="glossary">
  <a class="skip-link" href="#glossary-main" data-i18n="knowledge.common.skip">Skip to main content</a>
  <header data-public-header-placeholder></header>
  <main id="glossary-main">
    <section class="knowledge-hero">
      <div class="knowledge-shell">
        <p class="knowledge-eyebrow" data-i18n="knowledge.glossary.eyebrow">Canonical Glossary</p>
        <h1 data-i18n="knowledge.glossary.title">The registered language of Book I.</h1>
        <p class="knowledge-hero__lead" data-i18n="knowledge.glossary.lead">Search 41 concepts by name, definition, Part or stability state.</p>
      </div>
    </section>
    <section class="knowledge-section knowledge-section--paper">
      <div class="knowledge-shell">
        <div class="knowledge-controls">
          <div class="knowledge-field">
            <label for="glossary-search" data-i18n="knowledge.glossary.searchLabel">Search concepts</label>
            <input id="glossary-search" type="search" data-i18n-placeholder="knowledge.glossary.searchPlaceholder" placeholder="Search a term or definition" autocomplete="off">
          </div>
          <div class="knowledge-field">
            <label for="glossary-status" data-i18n="knowledge.glossary.statusLabel">Stability</label>
            <select id="glossary-status">
              <option value="all" data-i18n="knowledge.glossary.all">All statuses</option>
              <option value="stable" data-i18n="knowledge.glossary.stable">Stable</option>
              <option value="provisional" data-i18n="knowledge.glossary.provisional">Provisional</option>
            </select>
          </div>
        </div>
        <p class="knowledge-results" aria-live="polite" data-glossary-results></p>
        <div class="glossary-grid" data-glossary-grid></div>
        <p class="knowledge-empty" hidden data-glossary-empty data-i18n="knowledge.glossary.noResult">No concepts match this search.</p>
        <p class="knowledge-boundary" data-i18n="knowledge.glossary.englishEditorial">
          English definition is a transparent editorial translation; the Chinese registry remains canonical.
        </p>
      </div>
    </section>
  </main>
  <footer data-public-footer-placeholder></footer>
  <script type="module" src="/assets/js/public-shell.js"></script>
  <script type="module" src="/assets/js/pages/glossary.js"></script>
</body>
</html>
